<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Podcast Landing Page</title>

  <style>

    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#f3f3f3;
  padding:8px;
}

.container{
  width:100%;
  min-height:100vh;
  background:#4f0202;
  overflow:hidden;
  position:relative;
  padding:25px 30px;
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  position:relative;
  z-index:10;
}

.logo{
  color:white;
  font-size:28px;
  font-weight:bold;
}

.nav-links{
  display:flex;
  gap:50px;
  list-style:none;
  color:white;
  font-size:15px;
}

.nav-buttons{
  display:flex;
  gap:15px;
}

.signup{
  background:#f1f1f1;
  border:none;
  padding:14px 30px;
  border-radius:30px;
  font-weight:bold;
}

.login{
  background:#ff7a2f;
  color:white;
  border:none;
  padding:14px 30px;
  border-radius:30px;
  font-weight:bold;
}

.hero{
  position:relative;
  width:100%;
  height:780px;
}

.left-title{
  position:absolute;
  left:0;
  top:40px;
  z-index:1;
}

.left-title h1{
  font-size:155px;
  line-height:0.9;
  color:#f1f1f1;
  font-weight:900;
}

.orange-box{
  position:absolute;
  left:0;
  bottom:0;
  width:520px;
  height:310px;
  background:#ff7d35;
  overflow:hidden;
}

.circle1{
  position:absolute;
  width:600px;
  height:600px;
  border-radius:50%;
  border:35px solid rgba(255,255,255,0.15);
  left:-280px;
  bottom:-280px;
}

.circle2{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  border:35px solid rgba(255,255,255,0.12);
  left:-220px;
  bottom:-220px;
}

.mic{
  position:absolute;
  width:140px;
  height:360px;
  background:black;
  border-radius:80px;
  left:80px;
  bottom:-40px;
  transform:rotate(-20deg);
  z-index:4;
}

.mic::before{
  content:"";
  position:absolute;
  width:110px;
  height:180px;
  background:#070707;
  border-radius:70px;
  top:-80px;
  left:15px;
}

.center-image{
  position:absolute;
  left:430px;
  top:60px;
  z-index:5;
}

.center-image img{
  width:460px;
  height:620px;
  object-fit:cover;
}

.right-text{
  position:absolute;
  right:40px;
  top:250px;
  width:650px;
  z-index:2;
}

.right-text h2{
  color:#f1f1f1;
  font-size:88px;
  line-height:0.95;
  font-weight:900;
  text-transform:uppercase;
}

.member-card{
  position:absolute;
  right:520px;
  bottom:140px;
  background:#f4ece6;
  width:230px;
  padding:25px;
  border-radius:28px;
  z-index:6;
}

.member-card p{
  color:#777;
  margin-bottom:15px;
}

.avatars{
  display:flex;
  margin-bottom:18px;
}

.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#bbb;
  border:3px solid white;
  margin-right:-12px;
}

.member-card h3{
  font-size:48px;
  margin-bottom:5px;
}

.member-card span{
  color:#777;
}

  </style>

</head>

<body>

  <div class="container">

    <nav class="navbar">

      <div class="logo">
        ◉ whisper
      </div>

      <ul class="nav-links">
        <li>About us</li>
        <li>Provide</li>
        <li>Top Creators</li>
        <li>Let's Join Us</li>
      </ul>

      <div class="nav-buttons">
        <button class="signup">Sign Up</button>
        <button class="login">Login</button>
      </div>

    </nav>

    <section class="hero">

  <div class="left-title">

    <h1>
      LISTEN <br>
      TO <br>
      TALKS!
    </h1>

  </div>

  <div class="orange-box">

    <div class="circle1"></div>
    <div class="circle2"></div>

  </div>

  <div class="mic"></div>

  <div class="center-image">

    <img 
src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
alt="girl">

  </div>

  <div class="right-text">

    <h2>
      SOME FUN <br>
      EVERY VOICE <br>
      REALLY <br>
      MATTERS !
    </h2>

  </div>

  <div class="member-card">

    <p>Our Members</p>

    <div class="avatars">

      <div class="avatar"></div>
      <div class="avatar"></div>
      <div class="avatar"></div>

    </div>

    <h3>100K+</h3>

    <span>Monthly Listeners</span>

  </div>

</section>

</body>
</html>
