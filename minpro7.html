<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meti AI Landing Page</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#e9e9e9;
      padding:15px;
    }

    .container{
      max-width:1400px;
      margin:auto;
      background:linear-gradient(135deg,#183d1c,#285f28,#1d421d);
      min-height:100vh;
      border-radius:10px;
      overflow:hidden;
      position:relative;
      padding:35px 50px;
      color:white;
    }

    .shape1{
      position:absolute;
      width:350px;
      height:350px;
      background:rgba(255,255,255,0.05);
      border-radius:80px;
      transform:rotate(45deg);
      top:-100px;
      right:-80px;
    }

    .shape2{
      position:absolute;
      width:320px;
      height:320px;
      background:rgba(255,255,255,0.05);
      border-radius:80px;
      transform:rotate(45deg);
      bottom:-120px;
      left:-120px;
    }

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:40px;
      position:relative;
      z-index:2;
    }

    .logo{
      font-size:38px;
      font-weight:bold;
      color:#d8ff67;
    }

    .nav-links{
      display:flex;
      gap:40px;
      list-style:none;
      font-size:16px;
    }

    .download-btn{
      background:#d8ff67;
      color:black;
      border:none;
      padding:16px 28px;
      border-radius:40px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .hero{
      display:grid;
      grid-template-columns:1fr 1fr;
      align-items:center;
      gap:40px;
      position:relative;
      z-index:2;
    }

    .left{
      position:relative;
    }

    .big-text{
      font-size:120px;
      line-height:0.9;
      font-family:Georgia, serif;
      font-weight:normal;
      color:#f2f2e8;
    }

    .ai-text{
      position:absolute;
      right:-40px;
      top:120px;
      font-size:110px;
      color:#d8ff67;
      font-family:Georgia, serif;
    }

    .play-box{
      display:flex;
      align-items:flex-start;
      gap:15px;
      margin-top:40px;
    }

    .play-icon{
      width:50px;
      height:50px;
      background:#d8ff67;
      color:black;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
    }

    .play-box p{
      color:#d8d8d8;
      line-height:1.6;
      font-size:20px;
    }

    .center-image{
      position:relative;
      display:flex;
      justify-content:center;
    }

    .image-card{
      position:relative;
      width:380px;
    }

    .image-card img{
      width:100%;
      border-radius:30px;
      display:block;
    }

    .assistant-tag{
      position:absolute;
      top:-18px;
      left:50%;
      transform:translateX(-50%);
      background:#f3efe7;
      color:black;
      padding:14px 24px;
      border-radius:30px;
      font-weight:bold;
    }

    .small-profile{
      position:absolute;
      bottom:-40px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      padding:10px;
      border-radius:50%;
    }

    .small-profile img{
      width:90px;
      height:90px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid rgba(255,255,255,0.2);
    }

    .bottom-section{
      margin-top:80px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:40px;
      align-items:end;
      position:relative;
      z-index:2;
    }

    .phone img{
      width:260px;
      transform:rotate(-12deg);
    }

    .app-card{
      background:#f4f0e7;
      color:black;
      padding:40px;
      border-radius:25px;
      text-align:center;
    }

    .app-card h2{
      font-size:56px;
      line-height:1.1;
      font-family:Georgia, serif;
      margin-bottom:30px;
    }

    .ios-btn{
      background:#a10f1d;
      color:white;
      border:none;
      padding:16px 30px;
      border-radius:40px;
      font-size:18px;
      cursor:pointer;
    }

    .right-info{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
      gap:25px;
    }

    .avatars{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .avatars img{
      width:65px;
      height:65px;
      border-radius:50%;
      border:4px solid white;
      object-fit:cover;
    }

    .rating{
      color:#d8ff67;
      font-size:42px;
      font-weight:bold;
    }

    .right-info h3{
      font-size:42px;
      line-height:1.1;
      max-width:320px;
    }

    @media(max-width:1100px){

      .hero{
        grid-template-columns:1fr;
        text-align:center;
      }

      .bottom-section{
        grid-template-columns:1fr;
        justify-items:center;
      }

      .big-text{
        font-size:70px;
      }

      .ai-text{
        position:static;
        display:block;
        margin-top:20px;
        font-size:70px;
      }

      .nav-links{
        display:none;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <div class="shape1"></div>
    <div class="shape2"></div>

    <nav class="navbar">

      <div class="logo">
        meti
      </div>

      <ul class="nav-links">
        <li>Features</li>
        <li>Pricing</li>
        <li>Support</li>
        <li>Contact</li>
      </ul>

      <button class="download-btn">
        Download App ↓
      </button>

    </nav>

    <section class="hero">

      <div class="left">

        <h1 class="big-text">
          Connect
        </h1>

        <span class="ai-text">
          with ❤️AI
        </span>

        <div class="play-box">

          <div class="play-icon">
            ▶
          </div>

          <p>
            AI-powered meetings <br>
            for smarter <br>
            collaboration! <br>
            Easy to use anywhere.
          </p>

        </div>

      </div>

      <div class="center-image">

        <div class="image-card">

          <div class="assistant-tag">
            Sales AI Assistant
          </div>

          <img src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg"
          alt="person">

          <div class="small-profile">

            <img src="https://images.pexels.com/photos/614810/pexels-photo-614810.jpeg"
            alt="profile">

          </div>

        </div>

      </div>

    </section>

    <section class="bottom-section">

      <div class="phone">

        <img src="https://images.pexels.com/photos/607812/pexels-photo-607812.jpeg"
        alt="phone">

      </div>

      <div class="app-card">

        <h2>
          Discover and join <br>
          New Meti app!
        </h2>

        <button class="ios-btn">
          Get for iOS 
        </button>

      </div>

      <div class="right-info">

        <div class="avatars">

          <img src="https://images.pexels.com/photos/415829/pexels-photo-415829.jpeg">

          <img src="https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg">

          <span class="rating">5★</span>

        </div>

        <h3>
          Dive Into Seamless
          Communication,
          Anytime, Anywhere.
        </h3>

      </div>

    </section>

  </div>

</body>
</html>
